apiVersion: apps/v1
kind: Deployment
metadata:
  name: secure-eks-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: secure-eks-app
  template:
    metadata:
      labels:
        app: secure-eks-app
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: nginx
          image: 646709836987.dkr.ecr.ap-south-1.amazonaws.com/secure-eks-app:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          securityContext:
            runAsUser: 101
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
