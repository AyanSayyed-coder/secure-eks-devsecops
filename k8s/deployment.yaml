apiVersion: apps/v1
kind: Deployment
metadata:
  name: secure-eks-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: secure-eks-app
  template:
    metadata:
      labels:
        app: secure-eks-app
    spec:
      containers:
      - name: secure-eks-app
        image: IMAGE_PLACEHOLDER
        ports:
        - containerPort: 80
